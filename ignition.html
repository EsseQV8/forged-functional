<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ignition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Barlow+Condensed:wght@600;700;800&family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0a0a0d; --ink2:#13131a; --ash:#1d1d26;
  --ember:#ff5a1f; --emberDim:#c2410c; --gold:#e0a93b;
  --smoke:#9a9aa8; --bone:#f4efe6; --line:#2a2a36;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  background:var(--ink); color:var(--bone);
  font-family:'Barlow Condensed',sans-serif;
  overflow:hidden; position:fixed; width:100%; height:100%;
  display:flex; flex-direction:column;
}

/* top nav */
#topbar{
  display:flex; align-items:center; justify-content:center; gap:7px;
  padding:14px 12px calc(env(safe-area-inset-top) + 4px); flex-shrink:0;
  position:relative; z-index:5;
}
.navbtn{
  font-family:'Cinzel',serif; font-size:12px; font-weight:600; letter-spacing:0.18em;
  text-transform:uppercase; color:var(--smoke); background:none; border:1px solid var(--line);
  padding:8px 16px; border-radius:999px; cursor:pointer; transition:all .2s;
}
.navbtn.on{ color:var(--ink); background:var(--ember); border-color:var(--ember); }

/* views */
.view{ flex:1; display:none; flex-direction:column; min-height:0; }
.view.on{ display:flex; }

/* ── IGNITION ── */
#ignition{ position:relative; align-items:center; justify-content:center; padding:0; }
#bg{ position:absolute; inset:0; z-index:0; transition:opacity .5s; }
#quoteWrap{
  position:relative; z-index:2; flex:1; display:flex; align-items:center; justify-content:center;
  width:100%; padding:24px 26px; text-align:center;
}
#quote{
  font-family:'Oswald',sans-serif; font-weight:700; line-height:1.04;
  letter-spacing:-0.01em; color:var(--bone);
  text-shadow:0 2px 30px rgba(0,0,0,0.9), 0 1px 4px rgba(0,0,0,0.8);
  text-wrap:balance; transition:opacity .25s;
}
#controls{
  position:relative; z-index:3; flex-shrink:0;
  padding:0 22px calc(env(safe-area-inset-bottom) + 26px);
  display:flex; flex-direction:column; align-items:center; gap:14px; width:100%;
}
#feed{
  width:100%; max-width:440px; padding:20px; border:none; border-radius:16px; cursor:pointer;
  font-family:'Cinzel',serif; font-weight:700; font-size:17px; letter-spacing:0.16em;
  text-transform:uppercase; color:#1a0a02;
  background:linear-gradient(135deg,#ff7a33,#ff5a1f 55%,#d4400a);
  box-shadow:0 0 32px rgba(255,90,31,0.45), inset 0 1px 0 rgba(255,255,255,0.25);
  transition:transform .08s, box-shadow .3s;
}
#feed:active{ transform:scale(0.97); box-shadow:0 0 48px rgba(255,90,31,0.7); }
.tune-row{ display:flex; gap:12px; width:100%; max-width:440px; }
.tune{
  flex:1; padding:11px; border:1px solid var(--line); background:rgba(255,255,255,0.02);
  border-radius:11px; cursor:pointer; color:var(--smoke);
  font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:14px;
  letter-spacing:0.1em; text-transform:uppercase; transition:all .15s;
}
.tune:active{ transform:scale(0.96); }
.tune.more:active{ border-color:var(--ember); color:var(--ember); }
.tune.less:active{ border-color:var(--smoke); color:var(--bone); }
#tuneNote{ font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--emberDim); height:13px; transition:opacity .3s; opacity:0; font-weight:700; }

/* ── GAS / FLAME ── */
.linkview{ padding:8px 18px 0; overflow-y:auto; }
.lv-head{ text-align:center; margin-bottom:18px; }
.lv-title{ font-family:'Cinzel',serif; font-size:26px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; }
#gas .lv-title{ color:var(--ember); }
#flame .lv-title{ color:var(--gold); }
.lv-sub{ font-size:13px; letter-spacing:0.12em; text-transform:uppercase; color:var(--smoke); margin-top:4px; }
.addbar{ display:flex; flex-direction:column; gap:9px; margin-bottom:20px; background:var(--ink2); padding:14px; border-radius:14px; border:1px solid var(--line); }
.addbar input{
  width:100%; background:var(--ash); border:1px solid var(--line); color:var(--bone);
  padding:12px 13px; border-radius:9px; font-family:'Barlow Condensed',sans-serif;
  font-size:16px; outline:none;
}
.addbar input:focus{ border-color:var(--ember); }
.addbtn{
  padding:13px; border:none; border-radius:9px; cursor:pointer; color:#1a0a02;
  font-family:'Cinzel',serif; font-weight:700; font-size:14px; letter-spacing:0.12em; text-transform:uppercase;
}
#gas .addbtn{ background:var(--ember); }
#flame .addbtn{ background:var(--gold); }
.linklist{ display:flex; flex-direction:column; gap:10px; padding-bottom:40px; }
.linkcard{
  display:flex; align-items:center; gap:12px; background:var(--ink2);
  border:1px solid var(--line); border-radius:12px; padding:14px 15px; text-decoration:none;
  transition:border-color .2s;
}
.linkcard:active{ border-color:var(--ember); }
.lc-body{ flex:1; min-width:0; }
.lc-title{ font-weight:700; font-size:16px; color:var(--bone); letter-spacing:0.01em; }
.lc-url{ font-size:12px; color:var(--smoke); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; letter-spacing:0.02em; }
.lc-del{ flex-shrink:0; width:30px; height:30px; border-radius:8px; border:1px solid var(--line); background:none; color:var(--smoke); font-size:16px; cursor:pointer; }
.lc-empty{ text-align:center; color:var(--smoke); font-size:14px; padding:40px 20px; letter-spacing:0.04em; }
.lc-arrow{ flex-shrink:0; color:var(--emberDim); font-size:18px; }
#flame .lc-arrow{ color:var(--gold); }
.syncnote{ text-align:center; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:#55555f; padding:6px 0 14px; }
</style>
</head>
<body>

<div id="topbar">
  <button class="navbtn on" id="nav-ignition" onclick="show('ignition')">Ignition</button>
  <button class="navbtn" id="nav-gas" onclick="show('gas')">Gas</button>
  <button class="navbtn" id="nav-flame" onclick="show('flame')">Flame</button>
</div>

<!-- IGNITION -->
<div class="view on" id="ignition">
  <div id="bg"></div>
  <div id="quoteWrap"><div id="quote">&nbsp;</div></div>
  <div id="controls">
    <div id="tuneNote"></div>
    <button id="feed" onclick="feedFire()">&#128293;&nbsp; Feed the Fire</button>
    <div class="tune-row">
      <button class="tune more" onclick="tune(1)">&#9650; More</button>
      <button class="tune less" onclick="tune(-1)">&#9660; Less</button>
    </div>
  </div>
</div>

<!-- GAS -->
<div class="view linkview" id="gas">
  <div class="lv-head"><div class="lv-title">Gas</div><div class="lv-sub">Watch &middot; Listen</div></div>
  <div class="addbar">
    <input id="gas-title" placeholder="Title (e.g. Goggins clip)" />
    <input id="gas-url" placeholder="Paste link" inputmode="url" />
    <button class="addbtn" onclick="addLink('gas')">Add to Gas</button>
  </div>
  <div class="linklist" id="gas-list"></div>
  <div class="syncnote">Synced across your devices</div>
</div>

<!-- FLAME -->
<div class="view linkview" id="flame">
  <div class="lv-head"><div class="lv-title">Flame</div><div class="lv-sub">Read &middot; Words</div></div>
  <div class="addbar">
    <input id="flame-title" placeholder="Title (e.g. Spurgeon line)" />
    <input id="flame-url" placeholder="Paste link" inputmode="url" />
    <button class="addbtn" onclick="addLink('flame')">Add to Flame</button>
  </div>
  <div class="linklist" id="flame-list"></div>
  <div class="syncnote">Synced across your devices</div>
</div>

// ── State (weights + links) ──
var STATE={ weights:{}, gas:[], flame:[] };
var lastIdx=-1;

function saveState(){
  if(FB_OK && IGN_REF){ try{ IGN_REF.set(STATE); }catch(e){} }
  try{ localStorage.setItem('ignition', JSON.stringify(STATE)); }catch(e){}
}
function loadState(cb){
  // try local first for instant paint
  try{ var l=localStorage.getItem('ignition'); if(l) STATE=Object.assign(STATE,JSON.parse(l)); }catch(e){}
  if(FB_OK && IGN_REF){
    IGN_REF.once('value').then(function(snap){
      var v=snap.val();
      if(v){ STATE=Object.assign({weights:{},gas:[],flame:[]}, v); }
      cb();
    }).catch(function(){ cb(); });
  } else { cb(); }
}

// ── Weighted random quote pick ──
function weightOf(i){ var w=STATE.weights[i]; return (w===undefined)?1:w; }
function pickQuote(){
  var total=0, i;
  for(i=0;i<QUOTES.length;i++){ total += weightOf(i); }
  if(total<=0){ return Math.floor(Math.random()*QUOTES.length); }
  var roll=Math.random()*total, acc=0, choice=0;
  for(i=0;i<QUOTES.length;i++){
    acc += weightOf(i);
    if(roll<=acc){ choice=i; break; }
  }
  // avoid immediate repeat if possible
  if(choice===lastIdx && QUOTES.length>1){ return pickQuote(); }
  return choice;
}

// ── Auto-fit: size font to fill the quote box ──
function fitText(){
  var wrap=document.getElementById('quoteWrap');
  var el=document.getElementById('quote');
  var maxW=wrap.clientWidth-2, maxH=wrap.clientHeight-2;
  var size=120; // start big
  el.style.fontSize=size+'px';
  while(size>22 && (el.scrollWidth>maxW || el.scrollHeight>maxH)){
    size-=2; el.style.fontSize=size+'px';
  }
}

function showQuote(i){
  lastIdx=i;
  var el=document.getElementById('quote');
  el.style.opacity=0;
  setTimeout(function(){
    el.textContent=QUOTES[i].t;
    fitText();
    el.style.opacity=1;
    cycleBg();
  },120);
}
function feedFire(){ showQuote(pickQuote()); }

function tune(dir){
  if(lastIdx<0) return;
  var cur=weightOf(lastIdx);
  var next = dir>0 ? Math.min(cur*2, 16) : Math.max(cur/2, 0.0625);
  STATE.weights[lastIdx]=next;
  saveState();
  var note=document.getElementById('tuneNote');
  note.textContent = dir>0 ? 'More of this' : 'Less of this';
  note.style.opacity=1;
  setTimeout(function(){ note.style.opacity=0; },900);
  setTimeout(function(){ feedFire(); },260);
}

// ── Ambient background (CSS gradients, no image files needed) ──
var BGS=[
  'radial-gradient(circle at 50% 120%, #3a1505 0%, #1a0a04 45%, #0a0a0d 100%)',
  'radial-gradient(circle at 30% 20%, #2a1208 0%, #120a10 50%, #0a0a0d 100%)',
  'linear-gradient(160deg, #1a0d06 0%, #0d0d14 60%, #0a0a0d 100%)',
  'radial-gradient(circle at 70% 80%, #34160a 0%, #150d0a 50%, #0a0a0d 100%)',
  'linear-gradient(200deg, #20100a 0%, #0d0b12 55%, #08080b 100%)',
  'radial-gradient(circle at 50% 0%, #2e1408 0%, #130b0d 55%, #0a0a0d 100%)'
];
function cycleBg(){
  var bg=document.getElementById('bg');
  bg.style.background=BGS[Math.floor(Math.random()*BGS.length)];
}

// ── Nav ──
function show(id){
  ['ignition','gas','flame'].forEach(function(v){
    document.getElementById(v).className='view'+(v===id?' on':'')+((v!=='ignition')?' linkview':'');
    document.getElementById('nav-'+v).className='navbtn'+(v===id?' on':'');
  });
  if(id==='ignition') fitText();
}

// ── Gas / Flame links ──
function addLink(kind){
  var t=document.getElementById(kind+'-title').value.trim();
  var u=document.getElementById(kind+'-url').value.trim();
  if(!u){ return; }
  if(!/^https?:\/\//i.test(u)) u='https://'+u;
  if(!t) t=u.replace(/^https?:\/\//,'').split('/')[0];
  STATE[kind].unshift({t:t,u:u});
  saveState();
  document.getElementById(kind+'-title').value='';
  document.getElementById(kind+'-url').value='';
  renderLinks(kind);
}
function delLink(kind,idx){
  STATE[kind].splice(idx,1); saveState(); renderLinks(kind);
}
function renderLinks(kind){
  var list=document.getElementById(kind+'-list');
  var arr=STATE[kind]||[];
  if(!arr.length){
    list.innerHTML='<div class="lc-empty">Nothing here yet. Drop a link above.</div>';
    return;
  }
  list.innerHTML=arr.map(function(it,i){
    return '<a class="linkcard" href="'+it.u+'" target="_blank" rel="noopener">'+
      '<div class="lc-body"><div class="lc-title">'+escapeHtml(it.t)+'</div>'+
      '<div class="lc-url">'+escapeHtml(it.u)+'</div></div>'+
      '<span class="lc-arrow">&#8599;</span>'+
      '<button class="lc-del" onclick="event.preventDefault();event.stopPropagation();delLink(\''+kind+'\','+i+')">&times;</button>'+
      '</a>';
  }).join('');
}
function escapeHtml(s){ return (s||'').replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

// ── Init ──
window.addEventListener('resize', function(){ if(document.getElementById('ignition').classList.contains('on')) fitText(); });
loadState(function(){
  renderLinks('gas'); renderLinks('flame');
  cycleBg();
  feedFire();
});
</script>
</body>
</html>
